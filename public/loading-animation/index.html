<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<title>LORICATUS — drone scan v11</title>
<style>
  :root {
    --bg:        #2B3B46;   /* loricatus-dark (Bellwether Black) */
    --bg-deep:   #1F2C36;   /* edge tone for vignette */
    --yellow:    #c8ff20;
    --gray:      #a8a8a8;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg-deep); overflow:hidden; font-family: ui-monospace, Menlo, monospace; }

  .stage-wrap {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: radial-gradient(ellipse at center, var(--bg) 0%, var(--bg-deep) 90%);
  }
  .stage {
    width: min(100vw, calc(100vh * 16/9));
    aspect-ratio: 16/9;
    position: relative;
    overflow: hidden;
    background: transparent;
  }
  .stage::before {
    content:""; position:absolute; inset:0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.35) 100%);
    z-index: 5; pointer-events:none;
  }
  /* .grid removed — flat brand-dark with soft radial vignette only. */

  /* Layers */
  .layer.logo-layer {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 75%;
    z-index: 4;
  }
  .layer.logo-layer svg { width: 100%; display: block; overflow: visible; }

  .layer.points-layer {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 75%;
    aspect-ratio: 466.05 / 192.96;
    z-index: 3;
  }
  .layer.points-layer canvas { width: 100%; height: 100%; display: block; }

  .layer.drones-layer {
    position: absolute; inset: 0;
    z-index: 2;
    overflow: hidden;
  }
  .layer.drones-layer svg {
    width: 100%; height: 100%; display: block;
    overflow: hidden;
  }

  /* Drone wrapper */
  .drone { opacity: 1; }

  /* The .flight group does:
   *   1) entry: travel from offscreen to a "hover point" (near the fragment)
   *   2) hover: small chaotic motion around hover point while scanning
   *   3) land: travel from hover point to fragment center, shrink + fade
   *
   * We split this into TWO nested groups for cleaner animation:
   *   .entry-hover  — handles entry travel + hover (continuous)
   *   .land         — wraps the body, handles final landing translate to (0,0)
   *
   * Drone body's "rest" position = at the hover offset (hx, hy) relative to fragment center
   * Initial position = (sx, sy) far offscreen
   * Final position = (0, 0) at fragment
   */
  .flight {
    transform-origin: 0 0;
    will-change: transform, opacity;
    /* Initial offscreen */
    transform: translate(var(--sx), var(--sy));
    opacity: 1;
  }

  .drone-body .body {
    fill: none;
    stroke: var(--yellow);
    stroke-width: 0.45;
  }
  .gray .drone-body .body { stroke: var(--gray); }
  .drone-body .arm {
    stroke: var(--yellow);
    stroke-width: 0.4;
    stroke-linecap: round;
    fill: none;
  }
  .gray .drone-body .arm { stroke: var(--gray); }
  .drone-body .rotor {
    fill: none;
    stroke: var(--yellow);
    stroke-width: 0.35;
    opacity: 0.9;
    transform-box: fill-box;
    transform-origin: center;
  }
  .gray .drone-body .rotor { stroke: var(--gray); }
  .drone-body .led { fill: var(--yellow); }
  .gray .drone-body .led { fill: var(--gray); }

  /* Continuous scan beam from drone (origin 0,0 in flight frame) to fragment center
   * Implemented as a line in the OUTER (target-anchored) drone group: x1=hover-point, x2=0,0
   * But hover point moves... Easier: render beam INSIDE flight group, going from (0,0 = drone)
   * to a target offset. That target offset = -current flight transform's translate ≈ negative of the drone's offset from fragment.
   * Simplest: separate beam SVG element synced via JS — but we want CSS-only.
   *
   * Compromise: beam is a child of the OUTER group (anchored at fragment center = 0,0).
   * It's drawn FROM (0,0) [fragment] TO the drone's current position.
   * We can fake this by giving it the same animation as flight, drawing from fragment to drone.
   * Use a <line> with x1=0,y1=0 (fragment) and x2,y2 animated to follow the drone.
   *
   * Implementation: put beam as sibling of .flight, with x2/y2 controlled by CSS transform
   * Actually SVG attributes can't be CSS-animated easily. Instead: beam is drawn as a path
   * that's just stroke-only between two points; we use a wrapper line and translate its tip.
   *
   * Cleanest: beam = a thin <line> from (0,0) to (1,0), inside its own wrapper that
   * scales/rotates to match the vector from fragment to drone. Use CSS transform on
   * beam wrapper that mirrors the flight transform, scaled appropriately.
   *
   * Let's go with: beam is INSIDE the outer group (anchored at fragment center).
   * It's a <line x1=0 y1=0 x2=0 y2=0> with a stroke. We update x2,y2 via JS each frame? No.
   *
   * Final approach: beam is a child of .flight group (drone-anchored origin).
   *   <line x1=0 y1=0 x2=neg(sx) y2=neg(sy)> means "from drone to fragment-center direction"
   *   But the drone moves, so the relative vector to fragment changes.
   *   Actually if beam line endpoint is at the FRAGMENT in world coords, and beam is child of .flight,
   *   the beam's local endpoint is "wherever the fragment is relative to the drone's local origin".
   *   Since drone's local origin sits at 0,0 (offset by flight translate), and fragment is at outer-group's 0,0,
   *   in beam's local coords: fragment is at -(flight_translate). That's animated.
   *   
   * Simpler: beam doesn't move with .flight. It's a direct child of outer (target-anchored) group.
   *   Beam line: x1=0 y1=0 (fragment), x2=animated to drone position.
   *   Animate x2,y2 via SMIL or via the line's transform.
   *   Use CSS `transform` on the beam <line>: rotate/scale to point from fragment to drone.
   *
   * EASIEST: Use a beam GROUP wrapped around a unit-length line, transformed each frame
   * via the same animation that moves the drone. We can place a <line> from (0,0) to (1,0)
   * inside a wrapper group, then animate the wrapper to scale-x to length-of-vector and rotate
   * by the angle. But the angle/length change with hover, which is hard in pure CSS.
   *
   * ALTERNATIVE (chosen): use TWO beams pre-baked along the most likely path, fade them in/out.
   * Or even SIMPLER: beam is a <line> as a CHILD of .flight, going from (0,0) (drone) to
   * a fixed target in beam-local coords. We use a separate "beam" element OUTSIDE .flight,
   * drawn from fragment (0,0) to the drone's CURRENT translated position. This is animatable
   * via the same transform.
   *
   * Implementation: make beam = a horizontal line at length 1 in its own group.
   * Set the group's transform via JS during render to point from fragment to drone — using
   * the SAME animation, by setting the beam wrapper to MATCH the flight transform's
   * translate, but scaled to draw a line.
   *
   * PRAGMATIC: skip the math. Render beam as line(0,0 → -sx,-sy) inside .flight, so its
   * other endpoint is at the FRAGMENT in world coords (since drone is at flight-translated
   * origin). Now during the animation, the line's endpoint stays at 0,0 of OUTER group =
   * fragment center. Why? Because everything inside .flight gets translated by the flight
   * transform, including the line. If line goes from (0,0) [drone] to (-sx,-sy) [where
   * fragment WAS relative to initial position], then after flight translates by current
   * offset (cx,cy), endpoint in world = (cx - sx, cy - sy). For beam to end at fragment
   * (0,0 in world), we need cx = sx and cy = sy — only true at initial frame. Doesn't work.
   *
   * RIGHT ANSWER: the beam endpoint must be at fragment center IN WORLD COORDS, regardless
   * of drone position. So beam should NOT be a child of .flight. Instead, render beam as
   * a SEPARATE element that we animate independently, with the same keyframes' scale/rotate
   * to always point from fragment (0,0) to drone's animated position.
   *
   * Use CSS keyframes that animate the beam's `transform` to match the drone's. The line is
   * drawn from (0,0) to (1,0); a scale-x sets length, a rotate sets direction.
   * But computing length/angle from sx,sy in keyframes... We'd need precomputed values.
   *
   * Solution: precompute and inject the keyframes per drone via JS using a unique
   * keyframe name. The keyframes set `transform: rotate(angle) scaleX(length)` from initial
   * (drone offscreen) to final (drone at fragment, length=0). With hover phase mid-animation
   * also baked in — we can compute hover point and add a 60% keyframe.
   *
   * Going with this approach. — Let's code it.
   */

  /* Final fragment */
  .frag {
    transform-box: fill-box;
    transform-origin: center;
    opacity: 0;
    will-change: opacity, transform, filter;
  }
  .frag.cls-1 { fill: var(--yellow); }
  .frag.cls-2 { fill: var(--gray); }

  /* Pointcloud rendered on canvas — no SVG rules needed */

  /* LIDAR scanning cone: visible but soft */
  .lidar-cone {
    fill: var(--yellow);
    opacity: 0;
    pointer-events: none;
  }
  .gray .lidar-cone { fill: var(--gray); }
  /* Faint center line of the cone (the actual ranging beam) */
  .lidar-axis {
    stroke: var(--yellow);
    stroke-width: 0.18;
    stroke-linecap: round;
    fill: none;
    opacity: 0;
  }
  .gray .lidar-axis { stroke: var(--gray); }

  /* Captions — flash twice after the main animation finishes. */
  .caption-layer {
    position: absolute; left: 0; right: 0; bottom: 11%;
    height: 18px; z-index: 6; pointer-events: none;
  }
  .caption {
    position: absolute; left: 50%; top: 0;
    font: 14px/1 ui-monospace, Menlo, monospace;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--yellow);
    opacity: 0;
    text-shadow: 0 0 8px rgba(200,255,32,0.45);
    white-space: nowrap;
    transform: translateX(-50%) translateY(6px);
  }
  .playing .caption {
    animation: cap-flash 0.95s cubic-bezier(.18,.7,.22,1) forwards;
    animation-delay: var(--cap-delay);
  }
  @keyframes cap-flash {
    0%   { opacity: 0; transform: translateX(-50%) translateY(6px); }
    18%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    78%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-4px); }
  }

  /* === Animations === */

  /* Drone flight + beam: gated on .playing so Replay re-runs them.
     Animation name is per-drone (custom via CSS var), set via inline style. */
  .playing .flight {
    animation-name: var(--flight-anim);
    animation-duration: var(--total);
    animation-delay: var(--delay);
    animation-timing-function: cubic-bezier(.4,.0,.4,1);
    animation-fill-mode: forwards;
  }
  .playing .lidar-wrap {
    animation-name: var(--lidar-anim);
    animation-duration: var(--total);
    animation-delay: var(--delay);
    animation-timing-function: linear;
    animation-fill-mode: forwards;
  }
  /* Only the soft cone — no bright center axis. */
  .playing .lidar-cone {
    opacity: 0.16;
    transform-origin: 0 0;
    animation: cone-sweep 0.42s ease-in-out infinite alternate;
  }
  .lidar-axis { display: none; }
  @keyframes cone-sweep {
    0%   { transform: scaleY(0.65) rotate(-3deg); opacity: 0.10; }
    50%  { transform: scaleY(1.05) rotate(0deg);  opacity: 0.20; }
    100% { transform: scaleY(0.85) rotate(3deg);  opacity: 0.13; }
  }

  /* Rotors spin while drone is visible */
  .playing .drone-body .rotor {
    animation: rotor-spin 0.1s linear infinite;
  }
  @keyframes rotor-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Pointcloud rendered on canvas — see drawFrame() in JS */

  /* Final fragment: blooms as points fade */
  .playing .frag {
    animation: frag-bloom 0.55s cubic-bezier(.18,.7,.22,1) forwards,
               frag-glow 4s ease-in-out infinite;
    animation-delay: var(--frag-delay), calc(var(--frag-delay) + 0.55s);
  }
  @keyframes frag-bloom {
    0%   {
      opacity: 0;
      transform: scale(0.85);
      filter: drop-shadow(0 0 10px rgba(200,255,32,0.9)) brightness(1.5);
    }
    50%  {
      opacity: 1;
      transform: scale(1.04);
      filter: drop-shadow(0 0 5px rgba(200,255,32,0.5)) brightness(1.15);
    }
    100% {
      opacity: 1;
      transform: scale(1);
      filter: none;
    }
  }
  @keyframes frag-glow {
    0%, 100% { filter: drop-shadow(0 0 0 transparent); }
    50%      { filter: drop-shadow(0 0 5px rgba(200,255,32,0.35)); }
  }
</style>
</head>
<body>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="layer drones-layer">
      <svg id="dronesSvg" viewBox="-77.7 -78.27 621.4 349.5" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <div class="layer points-layer">
      <canvas id="ptsCanvas"></canvas>
    </div>

    <div class="layer logo-layer">
      <svg id="logoSvg" viewBox="0 0 466.05 192.96"></svg>
    </div>

    <div class="caption-layer">
      <div class="caption" id="caption1">Építőipar 4.0</div>
      <div class="caption" id="caption2">Egy platformon</div>
    </div>
  </div>
</div>

<!-- Per-drone keyframes injected here -->
<style id="dynamic-keyframes"></style>

<script src="logo-paths.js?v=25"></script>
<script>
const NS = "http://www.w3.org/2000/svg";
const VB_W = 466.05, VB_H = 192.96;
const cx = VB_W/2, cy = VB_H/2;

const dronesSvg = document.getElementById('dronesSvg');
const ptsCanvas = document.getElementById('ptsCanvas');
const ptsCtx    = ptsCanvas.getContext('2d');
const logoSvg   = document.getElementById('logoSvg');
const dynKeyframes = document.getElementById('dynamic-keyframes');

const PATHS = window.__LOGO_PATHS;

// Pointcloud collected for canvas rendering
const allPoints = [];
let animStart = 0;
let rafId = null;

const CSS_VARS = getComputedStyle(document.documentElement);
const COLOR_YELLOW = CSS_VARS.getPropertyValue('--yellow').trim() || '#f4c41a';
const COLOR_GRAY   = CSS_VARS.getPropertyValue('--gray').trim()   || '#a8a8a8';

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = ptsCanvas.getBoundingClientRect();
  ptsCanvas.width  = Math.max(1, Math.floor(rect.width  * dpr));
  ptsCanvas.height = Math.max(1, Math.floor(rect.height * dpr));
  ptsCtx.setTransform(
    ptsCanvas.width  / VB_W, 0,
    0, ptsCanvas.height / VB_H,
    0, 0
  );
}
window.addEventListener('resize', resizeCanvas);

function makeTempPath(d) {
  const tmp = document.createElementNS(NS, 'svg');
  tmp.setAttribute('viewBox', '0 0 ' + VB_W + ' ' + VB_H);
  tmp.style.position='absolute'; tmp.style.visibility='hidden'; tmp.style.width='500px';
  const p = document.createElementNS(NS, 'path');
  p.setAttribute('d', d);
  tmp.appendChild(p);
  document.body.appendChild(tmp);
  return { tmp, p };
}

function analyzePath(d) {
  const { tmp, p } = makeTempPath(d);
  const len = p.getTotalLength();
  const bb = p.getBBox();

  const outlineCount = Math.max(8, Math.floor(len / 3.0));
  const pts = [];
  for (let i=0; i<outlineCount; i++) {
    const pt = p.getPointAtLength((i / outlineCount) * len);
    pts.push({ x: pt.x, y: pt.y });
  }

  const fillTarget = Math.max(8, Math.floor(bb.width * bb.height / 25));
  let attempts = 0;
  const maxAttempts = fillTarget * 8;
  while (attempts < maxAttempts) {
    if (pts.length - outlineCount >= fillTarget) break;
    attempts++;
    const x = bb.x + Math.random() * bb.width;
    const y = bb.y + Math.random() * bb.height;
    const svgPt = tmp.createSVGPoint();
    svgPt.x = x; svgPt.y = y;
    if (p.isPointInFill(svgPt)) {
      pts.push({ x, y });
    }
  }

  document.body.removeChild(tmp);
  return { len, bb, center: { x: bb.x + bb.width/2, y: bb.y + bb.height/2 }, pts };
}

// Build drone body
function buildDroneBody() {
  const body = document.createElementNS(NS, 'g');
  body.setAttribute('class', 'drone-body');

  const armSize = 2.4;
  const arm1 = document.createElementNS(NS, 'line');
  arm1.setAttribute('class','arm');
  arm1.setAttribute('x1', -armSize); arm1.setAttribute('y1', -armSize);
  arm1.setAttribute('x2',  armSize); arm1.setAttribute('y2',  armSize);
  body.appendChild(arm1);
  const arm2 = document.createElementNS(NS, 'line');
  arm2.setAttribute('class','arm');
  arm2.setAttribute('x1',  armSize); arm2.setAttribute('y1', -armSize);
  arm2.setAttribute('x2', -armSize); arm2.setAttribute('y2',  armSize);
  body.appendChild(arm2);

  const bodyRect = document.createElementNS(NS, 'rect');
  bodyRect.setAttribute('class','body');
  bodyRect.setAttribute('x', -0.9); bodyRect.setAttribute('y', -0.7);
  bodyRect.setAttribute('width', 1.8); bodyRect.setAttribute('height', 1.4);
  bodyRect.setAttribute('rx', 0.3);
  body.appendChild(bodyRect);

  [[-armSize,-armSize],[armSize,-armSize],[-armSize,armSize],[armSize,armSize]].forEach(([rx,ry]) => {
    const rg = document.createElementNS(NS, 'g');
    rg.setAttribute('transform', `translate(${rx} ${ry})`);
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('class', 'rotor');
    c.setAttribute('cx', 0); c.setAttribute('cy', 0); c.setAttribute('r', 1.2);
    rg.appendChild(c);
    const blade = document.createElementNS(NS, 'line');
    blade.setAttribute('class', 'rotor');
    blade.setAttribute('x1', -1.2); blade.setAttribute('y1', 0);
    blade.setAttribute('x2',  1.2); blade.setAttribute('y2', 0);
    blade.setAttribute('stroke-width', '0.5');
    rg.appendChild(blade);
    body.appendChild(rg);
  });

  const led = document.createElementNS(NS, 'circle');
  led.setAttribute('class','led');
  led.setAttribute('cx', 0); led.setAttribute('cy', -1.2); led.setAttribute('r', 0.35);
  body.appendChild(led);

  return body;
}

// Phase timings (ms)
const SCAN_DUR = 700;      // entry + single sweep
const LAND_DUR = 600;      // land + morph

PATHS.forEach((entry, i) => {
  const d = entry.d;
  const cls = entry.cls;
  const isGray = (cls === 'cls-2');
  const info = analyzePath(d);
  const center = info.center;
  const fragSize = Math.max(info.bb.width, info.bb.height);

  // Entry direction (from outside stage toward fragment)
  const baseAng = Math.atan2(center.y - cy, center.x - cx);
  const ang = baseAng + (Math.random() - 0.5) * 1.6;
  const cosA = Math.cos(ang), sinA = Math.sin(ang);

  const STAGE_LEFT   = -77.7;
  const STAGE_RIGHT  = 543.75;
  const STAGE_TOP    = -78.27;
  const STAGE_BOTTOM = 271.23;

  const tx_e = cosA > 0 ? (STAGE_RIGHT - center.x) / cosA : (cosA < 0 ? (STAGE_LEFT - center.x) / cosA : Infinity);
  const ty_e = sinA > 0 ? (STAGE_BOTTOM - center.y) / sinA : (sinA < 0 ? (STAGE_TOP - center.y) / sinA : Infinity);
  const tEdge = Math.min(tx_e, ty_e);
  const t = tEdge + 50 + Math.random() * 50;
  const sx = cosA * t;
  const sy = sinA * t;

  // === Single-sweep scan ===
  // Drone enters from outside, makes ONE pass across the fragment at hover
  // distance, then lands. Two waypoints: sweep-start and sweep-end.
  const hoverDist = Math.max(8, Math.min(fragSize * 1.1, 13));
  const acrossExtent = Math.max(5, Math.min(fragSize * 0.7, 12));

  // Stand-off vector along entry axis
  const ox = cosA * hoverDist;
  const oy = sinA * hoverDist;
  // Perpendicular sweep axis
  const ax = -sinA;
  const ay =  cosA;
  // Two waypoints: enter side → exit side of fragment
  const wp = [
    { x: ox + ax * (-acrossExtent), y: oy + ay * (-acrossExtent) },
    { x: ox + ax * ( acrossExtent), y: oy + ay * ( acrossExtent) },
  ];
  // Settle point: midpoint, slightly closer to fragment
  const hx = (wp[0].x + wp[1].x) * 0.5 * 0.55;
  const hy = (wp[0].y + wp[1].y) * 0.5 * 0.55;

  // Phase delays
  const delay = i * 25;
  const scanStart = delay;
  const scanEnd = scanStart + SCAN_DUR;
  const landStart = scanEnd;
  const landEnd = landStart + LAND_DUR;
  const fragDelay = landStart + LAND_DUR * 0.3;

  // === Build drone with raster-scan keyframes ===
  // Phases:
  //   entry  → arrive at wp[0] (gentle ease-out)
  //   wp[0..5] raster scan: each waypoint has a brief HOLD then a transit to next
  //   end of scan → small settle at (hx,hy)
  //   land   → translate to (0,0), shrink, fade
  //
  // To get the "hold then move" feeling we put two keyframes per waypoint
  // (arrive, depart) with a small percentage gap = hold time.

  const total = SCAN_DUR + LAND_DUR;
  // Single-sweep timing within SCAN_DUR:
  //   0 → 30%: entry transit to wp[0]
  //   30 → 90%: sweep across to wp[1]
  //   90 → 100%: settle to (hx,hy)
  const wpTimes = [
    { arrive: 0.30, depart: 0.32 },
    { arrive: 0.90, depart: 0.92 },
  ];
  const settleAt = 0.98;

  const toPct = (scanFrac) => (SCAN_DUR * scanFrac) / total * 100;
  const scanEnd_pct = SCAN_DUR / total * 100;

  const tilt = (cosA > 0 ? -22 : 22);
  const droneAnimName = `flight-${i}`;
  const lidarAnimName = `lidar-${i}`;

  // Build drone keyframes string
  let droneFrames = '';
  droneFrames += `0%   { transform: translate(${sx}px, ${sy}px) rotate(${tilt}deg) scale(1); opacity: 1; }\n`;
  // First waypoint arrival (entry transit)
  // (fall through into wp[0].arrive)
  for (let k = 0; k < wp.length; k++) {
    const t = wpTimes[k];
    // Subtle banking: tilt left/right based on direction of travel
    const nextK = k + 1 < wp.length ? k + 1 : k;
    const dx = wp[nextK].x - wp[k].x;
    const bank = Math.max(-12, Math.min(12, dx * 1.2));
    droneFrames += `${toPct(t.arrive).toFixed(2)}% { transform: translate(${wp[k].x.toFixed(2)}px, ${wp[k].y.toFixed(2)}px) rotate(${(k===0 ? tilt*0.2 : 0).toFixed(1)}deg) scale(1); opacity: 1; }\n`;
    droneFrames += `${toPct(t.depart).toFixed(2)}% { transform: translate(${wp[k].x.toFixed(2)}px, ${wp[k].y.toFixed(2)}px) rotate(${bank.toFixed(1)}deg) scale(1); opacity: 1; }\n`;
  }
  droneFrames += `${toPct(settleAt).toFixed(2)}% { transform: translate(${hx.toFixed(2)}px, ${hy.toFixed(2)}px) rotate(0deg) scale(1); opacity: 1; }\n`;
  droneFrames += `${scanEnd_pct.toFixed(2)}% { transform: translate(${hx.toFixed(2)}px, ${hy.toFixed(2)}px) rotate(0deg) scale(1); opacity: 1; }\n`;
  droneFrames += `90%  { transform: translate(${(hx*0.3).toFixed(2)}px, ${(hy*0.3).toFixed(2)}px) rotate(0deg) scale(0.7); opacity: 0.85; }\n`;
  droneFrames += `100% { transform: translate(0, 0) rotate(0deg) scale(0.25); opacity: 0; }\n`;
  const droneKf = `@keyframes ${droneAnimName} { ${droneFrames} }`;

  // === LIDAR cone keyframes ===
  // The cone is anchored at fragment center (0,0). Its APEX must follow the drone.
  // We achieve this by translating the .lidar-wrap to drone position; inside it,
  // the cone polygon is drawn from (0,0) toward (-cone) — i.e. back toward fragment.
  // Length of cone axis = drone distance to fragment. Cone half-angle ~ atan(fragSize/2 / dist).
  // Implementation: lidar-wrap is a <g> that animates translate (matches drone pos exactly,
  // minus the landing/scale phase). Inside it, a polygon points from (0,0) back to (0,0)
  // through two outer corners — but since the fragment is at the OUTER end, we instead
  // build the cone in the OUTER svg space.
  //
  // Simpler approach: render the cone as a <polygon> that we re-shape per keyframe by
  // animating its transform. We use the same trick as before: draw a unit triangle and
  // scale+rotate it to match (apex at drone, base at fragment, base width ~ fragSize).
  //
  // Unit triangle in local coords: apex at (0,0), base centered at (1,0) with half-width
  // BASE_HALF. We rotate so +X axis points from drone TO fragment (i.e. -drone_pos),
  // and scale X by drone-to-fragment distance.
  const BASE_HALF = 0.5; // base half-width as fraction of distance (cone spread)
  function lidarTransform(dx, dy) {
    // dx,dy = drone position relative to fragment (0,0).
    // Cone apex sits AT drone. Base is at fragment.
    // Vector apex→base = (-dx, -dy). Length = sqrt(dx²+dy²). Angle = atan2(-dy,-dx).
    const L = Math.sqrt(dx*dx + dy*dy) || 0.001;
    const A = Math.atan2(-dy, -dx) * 180 / Math.PI;
    // We translate the triangle so its apex sits at (dx, dy), then rotate, then scaleX by L.
    return `translate(${dx.toFixed(2)}px, ${dy.toFixed(2)}px) rotate(${A.toFixed(2)}deg) scale(${L.toFixed(2)}, ${L.toFixed(2)})`;
  }

  let lidarFrames = '';
  lidarFrames += `0%   { transform: ${lidarTransform(sx, sy)}; opacity: 0; }\n`;
  // Fade in as drone approaches first waypoint
  lidarFrames += `${toPct(0.20).toFixed(2)}% { opacity: 0; }\n`;
  for (let k = 0; k < wp.length; k++) {
    const t = wpTimes[k];
    lidarFrames += `${toPct(t.arrive).toFixed(2)}% { transform: ${lidarTransform(wp[k].x, wp[k].y)}; opacity: 0.55; }\n`;
    lidarFrames += `${toPct(t.depart).toFixed(2)}% { transform: ${lidarTransform(wp[k].x, wp[k].y)}; opacity: 0.55; }\n`;
  }
  lidarFrames += `${toPct(settleAt).toFixed(2)}% { transform: ${lidarTransform(hx, hy)}; opacity: 0.4; }\n`;
  lidarFrames += `${scanEnd_pct.toFixed(2)}% { transform: ${lidarTransform(hx, hy)}; opacity: 0.3; }\n`;
  lidarFrames += `92%  { opacity: 0; }\n`;
  lidarFrames += `100% { transform: ${lidarTransform(0.001, 0.001)}; opacity: 0; }\n`;
  const lidarKf = `@keyframes ${lidarAnimName} { ${lidarFrames} }`;

  dynKeyframes.textContent += droneKf + lidarKf;

  // ── Build drone group
  const outer = document.createElementNS(NS, 'g');
  outer.setAttribute('class', 'drone' + (isGray ? ' gray' : ''));
  outer.setAttribute('transform', `translate(${center.x} ${center.y})`);

  // LIDAR cone (sibling of flight, anchored at fragment center 0,0).
  // Unit triangle: apex at (0,0), base centered at (1,0) with half-width BASE_HALF.
  // Animated transform translates apex to drone pos and rotates+scales so base
  // sits at fragment (0,0). This makes the cone visually emanate FROM the drone
  // TOWARD the fragment — exactly what a LIDAR scanner does.
  const lidarWrap = document.createElementNS(NS, 'g');
  lidarWrap.setAttribute('class', 'lidar-wrap');
  lidarWrap.style.transformOrigin = '0 0';
  lidarWrap.style.setProperty('--lidar-anim', lidarAnimName);
  lidarWrap.style.setProperty('--total', total + 'ms');
  lidarWrap.style.setProperty('--delay', delay + 'ms');

  // Cone polygon
  const cone = document.createElementNS(NS, 'polygon');
  cone.setAttribute('class', 'lidar-cone');
  cone.setAttribute('points', `0,0 1,${-BASE_HALF} 1,${BASE_HALF}`);
  lidarWrap.appendChild(cone);
  // Faint center axis line
  const axis = document.createElementNS(NS, 'line');
  axis.setAttribute('class', 'lidar-axis');
  axis.setAttribute('x1', 0); axis.setAttribute('y1', 0);
  axis.setAttribute('x2', 1); axis.setAttribute('y2', 0);
  lidarWrap.appendChild(axis);

  outer.appendChild(lidarWrap);

  // Flight (drone body)
  const flight = document.createElementNS(NS, 'g');
  flight.setAttribute('class', 'flight');
  flight.style.transformOrigin = '0 0';
  flight.style.setProperty('--sx', sx + 'px');
  flight.style.setProperty('--sy', sy + 'px');
  flight.style.setProperty('--flight-anim', droneAnimName);
  flight.style.setProperty('--total', total + 'ms');
  flight.style.setProperty('--delay', delay + 'ms');
  flight.appendChild(buildDroneBody());
  outer.appendChild(flight);

  dronesSvg.appendChild(outer);

  // ── Pointcloud points: emerge when the drone's LIDAR cone is closest to them.
  // For each point, find the waypoint whose hold-position is nearest, and
  // emerge the point during that waypoint's hold window.
  info.pts.forEach((pt) => {
    // Find nearest waypoint (in fragment-local coords; pt.x/pt.y are absolute,
    // wp[k] is relative to fragment center).
    const px = pt.x - center.x;
    const py = pt.y - center.y;
    let bestK = 0, bestD = Infinity;
    for (let k = 0; k < wp.length; k++) {
      const dx = px - wp[k].x;
      const dy = py - wp[k].y;
      const d = dx*dx + dy*dy;
      if (d < bestD) { bestD = d; bestK = k; }
    }
    const t = wpTimes[bestK];
    // Emerge time: during the hold window of the nearest waypoint
    const holdStart = scanStart + t.arrive * SCAN_DUR;
    const holdEnd   = scanStart + t.depart * SCAN_DUR;
    const emergeAt  = holdStart + Math.random() * (holdEnd - holdStart);
    const fadeAt    = fragDelay + 100 + Math.random() * 80;

    allPoints.push({
      x: pt.x,
      y: pt.y,
      r: isGray ? 0.55 : 0.6,
      gray: isGray,
      emergeAt,
      fadeAt,
    });
  });

  // Final fragment
  const frag = document.createElementNS(NS, 'path');
  frag.setAttribute('d', d);
  frag.setAttribute('class', 'frag ' + cls);
  frag.style.setProperty('--frag-delay', fragDelay + 'ms');
  logoSvg.appendChild(frag);
});

// Cache total animation duration for canvas rAF loop
let animDurationMax = 0;
for (let i = 0; i < allPoints.length; i++) {
  const end = allPoints[i].fadeAt + 400;  // FADE_DUR
  if (end > animDurationMax) animDurationMax = end;
}

resizeCanvas();

const EMERGE_DUR = 500;
const FADE_DUR   = 400;

function drawFrame() {
  const now = performance.now();
  const t = now - animStart;

  ptsCtx.save();
  ptsCtx.setTransform(1, 0, 0, 1, 0, 0);
  ptsCtx.clearRect(0, 0, ptsCanvas.width, ptsCanvas.height);
  ptsCtx.restore();

  let curGray = false;
  ptsCtx.fillStyle = COLOR_YELLOW;

  for (let i = 0; i < allPoints.length; i++) {
    const p = allPoints[i];
    if (t < p.emergeAt) continue;
    const emergeT = t - p.emergeAt;

    let alpha, scale;
    if (emergeT < EMERGE_DUR) {
      const k = emergeT / EMERGE_DUR;
      alpha = Math.min(1, k * 2);
      scale = k < 0.5 ? (0.3 + k * 2 * 1.3) : (1.6 - (k - 0.5) * 2 * 0.6);
    } else if (t < p.fadeAt) {
      alpha = 1;
      scale = 1;
    } else {
      const fadeT = t - p.fadeAt;
      if (fadeT >= FADE_DUR) continue;
      const k = fadeT / FADE_DUR;
      alpha = 1 - k;
      scale = 1 - k * 0.5;
    }

    if (alpha <= 0.01) continue;

    if (p.gray !== curGray) {
      ptsCtx.fillStyle = p.gray ? COLOR_GRAY : COLOR_YELLOW;
      curGray = p.gray;
    }

    ptsCtx.globalAlpha = alpha;
    ptsCtx.beginPath();
    ptsCtx.arc(p.x, p.y, p.r * scale, 0, Math.PI * 2);
    ptsCtx.fill();
  }

  ptsCtx.globalAlpha = 1;

  if (t < animDurationMax + 200) {
    rafId = requestAnimationFrame(drawFrame);
  } else {
    rafId = null;
  }
}

function play() {
  document.body.classList.remove('playing');
  void document.body.offsetHeight;
  requestAnimationFrame(() => {
    document.body.classList.add('playing');
    if (rafId) cancelAnimationFrame(rafId);
    animStart = performance.now();
    drawFrame();
  });
}
// Schedule the two caption flashes to fire right after the main animation ends.
// They're CSS-driven; we just set their per-element animation-delay.
const cap1 = document.getElementById('caption1');
const cap2 = document.getElementById('caption2');
const cap1Delay = animDurationMax + 50;   // first flash starts as the bloom settles
const cap2Delay = cap1Delay + 850;        // second flash overlaps slightly with the first's tail
cap1.style.setProperty('--cap-delay', cap1Delay + 'ms');
cap2.style.setProperty('--cap-delay', cap2Delay + 'ms');

resizeCanvas();
play();
</script>
</body>
</html>
